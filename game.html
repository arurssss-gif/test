<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ARTUR GAMES</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        nav { background: #1e293b; padding: 10px; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid gold; }
        button { cursor: pointer; padding: 8px 15px; border-radius: 5px; border: 1px solid gold; background: #334155; color: gold; font-weight: bold; }
        button.active { background: gold; color: black; }
        
        .tab { display: none; flex: 1; width: 100%; height: 100%; }
        .tab.active { display: flex; }

        /* CLICKER */
        .side { width: 200px; background: rgba(0,0,0,0.2); padding: 15px; overflow-y: auto; border-right: 1px solid #334155; }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .shop { width: 300px; background: #1e293b; padding: 15px; overflow-y: auto; border-left: 1px solid #334155; }
        #bigBtn { font-size: 100px; cursor: pointer; user-select: none; transition: 0.1s; }
        #bigBtn:active { transform: scale(0.8); }
        .item { background: #2d3748; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #444; }
        .item button { width: 100%; background: #22c55e; color: white; border: none; padding: 5px; cursor: pointer; }
        .item button:disabled { background: #444; }

        /* GAMES */
        .canvas { width: 600px; height: 250px; background: #1e293b; border: 2px solid white; position: relative; overflow: hidden; margin: auto; }
        #dino { position: absolute; bottom: 0; left: 50px; font-size: 40px; transform: scaleX(-1); }
        #mosq { position: absolute; font-size: 35px; width: 40px; height: 40px; bottom: 50px; left: 150px; }
    </style>
</head>
<body>

<nav>
    <button onclick="tab('c')" id="bc" class="active">CLICKER</button>
    <button onclick="tab('d')" id="bd">DINO</button>
    <button onclick="tab('m')" id="bm">MOSQUITO</button>
</nav>

<div id="tc" class="tab active">
    <div class="side"><h3>Top 10</h3><div id="lb"></div></div>
    <div class="main">
        <h2 id="lv">Level 1</h2>
        <div id="bigBtn" onclick="tap()">🪙</div>
        <h1 id="bal">$0</h1>
        <p>Click: +<span id="cpc">1</span> | Auto: +<span id="cps">0</span></p>
    </div>
    <div class="shop"><h3>Shop</h3><div id="sl"></div></div>
</div>

<div id="td" class="tab">
    <div class="main">
        <h1>Dino Score: <span id="ds">0</span></h1>
        <div class="canvas" onclick="dJump()"><div id="dino">🦖</div><div id="cx"></div></div>
    </div>
</div>

<div id="tm" class="tab">
    <div class="main">
        <h1>Height: <span id="ms">0</span></h1>
        <div class="canvas" style="width:350px; height:500px" id="mz"><div id="mosq">🦟</div></div>
    </div>
</div>

<script>
let money = 0, click = 1, auto = 0, lv = 1;
let items = [];
for(let i=1; i<=20; i++) items.push({ n: "Upgrade "+i, c: Math.floor(10 * Math.pow(1.5, i)), p: i*2, t: i%2===0?'c':'a' });

function tab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('t'+id).classList.add('active');
    document.getElementById('b'+id).classList.add('active');
    if(id === 'd') initDino(); else clearInterval(dTimer);
    if(id === 'm') initMos(); else clearInterval(mTimer);
}

function tap() { money += click; update(); }
function buy(i) {
    let u = items[i];
    if(money >= u.c) {
        money -= u.c;
        if(u.t === 'c') click += u.p; else auto += u.p;
        u.c *= 2;
        update();
    }
}

function update() {
    document.getElementById('bal').innerText = "$"+Math.floor(money);
    document.getElementById('cpc').innerText = click;
    document.getElementById('cps').innerText = auto;
    
    let shopHtml = "";
    items.forEach((u, i) => {
        shopHtml += <div class="item">${u.n} (+$${u.p})<br><button onclick="buy(${i})" ${money < u.c ? 'disabled' : ''}>Buy for $${u.c}</button></div>;
    });
    document.getElementById('sl').innerHTML = shopHtml;

    let lbHtml = "";
    for(let i=1; i<=10; i++) lbHtml += <div>${i}. Player_${i}: $${Math.floor(money/(i*0.5+1))}</div>;
    document.getElementById('lb').innerHTML = lbHtml;
}

setInterval(() => { if(auto > 0) { money += auto; update(); } }, 1000);

// DINO
let dTimer, dSc = 0, isJ = false;
function dJump() { if(!isJ) { isJ=true; let d=document.getElementById('dino'); d.style.bottom="120px"; setTimeout(()=>{d.style.bottom="0px"; isJ=false;}, 500); } }
function initDino() {
    dSc = 0; document.getElementById('cx').innerHTML = "";
    dTimer = setInterval(() => {
        dSc++; document.getElementById('ds').innerText = dSc;
        if(Math.random() < 0.02) {
            let c = document.createElement('div'); c.style.position="absolute"; c.style.bottom="0"; c.style.right="-50px"; c.style.fontSize="30px";
            c.innerText = "🌵"; c.className = "cactus"; document.getElementById('cx').appendChild(c);
        }
        document.querySelectorAll('.cactus').forEach(c => {
            let r = parseInt(c.style.right) || -50; c.style.right = (r + 7) + "px";
            let dBot = parseInt(document.getElementById('dino').style.bottom) || 0;
            if(r > 500 && r < 540 && dBot < 40) { alert("Game Over!"); initDino(); }
            if(r > 650) c.remove();
        });
    }, 20);
}

// MOSQUITO
let mTimer, mX=150, mY=100, mV=0, mHold=false, mSc=0, plts=[];
function initMos() {
    mX=150; mY=100; mV=0; mSc=0; plts=[];
    const z = document.getElementById('mz'); z.innerHTML = '<div id="mosq">🦟</div>';
    for(let i=0; i<7; i++) {
        let x = Math.random()*280, y = i*80;
        let p = document.createElement('div'); p.style.position="absolute"; p.style.width="60px"; p.style.height="10px"; p.style.background="white";
        p.style.left=x+"px"; p.style.bottom=y+"px"; z.appendChild(p); plts.push({x,y,e:p});
    }
    mTimer = setInterval(() => {
        mV -= 0.3; if(mHold) mV += 0.8; mY += mV;
        plts.forEach(p => {
            if(mV < 0 && mX > p.x-30 && mX < p.x+50 && mY > p.y && mY < p.y+10) { mV = 10; mSc++; }
            if(mY > 200) { p.y -= mV; p.e.style.bottom = p.y+"px"; }
            if(p.y < -20) { p.y = 550; p.x = Math.random()*280; p.e.style.left = p.x+"px"; }
        });
        if(mY < -50) initMos();
        let m = document.getElementById('mosq'); m.style.left = mX+"px"; m.style.bottom = Math.min(mY, 200)+"px";
        document.getElementById('ms').innerText = mSc;
    }, 20);
}

window.onkeydown = (e) => { 
    if(e.key === "ArrowLeft") mX -= 20; if(e.key === "ArrowRight") mX += 20; 
    if(e.key === " " || e.key === "ArrowUp") { mHold = true; dJump(); }
};
window.onkeyup = (e) => mHold = false;
document.onmousedown = () => mHold = true;
document.onmouseup = () => mHold = false;
update();
</script>
</body>
</html>
