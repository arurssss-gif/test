<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RUN - ULTIMATE CLICKER</title>
    <style>
        :root { --accent: #00f2ff; --bg: #05070a; --panel: #0d1117; --rage: #ff0050; --gold: #ffd700; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; display: flex; height: 100vh; overflow: hidden; user-select: none;
        }

        #debug-box { position: fixed; top: 0; left: 0; width: 100%; background: #ff0033; color: white; padding: 10px; font-weight: bold; z-index: 99999; display: none; font-size: 14px; text-align: center; }
        
        /* Шкала Rage */
        .rage-container { position: fixed; left: 20px; top: 50%; transform: translateY(-50%); width: 12px; height: 250px; background: #161b22; border-radius: 10px; overflow: hidden; border: 1px solid #333; z-index: 100; }
        #rage-fill { position: absolute; bottom: 0; width: 100%; height: 0%; background: linear-gradient(to top, var(--rage), #ff7b00); transition: height 0.05s linear; box-shadow: 0 0 15px var(--rage); }

        /* Главный экран */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 10px; }
        
        /* Полоса уровня (XP) */
        .xp-wrapper { width: 80%; max-width: 400px; background: #161b22; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 10px; border: 1px solid #21262d; }
        #xp-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.2s ease; }

        .stats-top { text-align: center; }
        h1#money { font-size: 50px; margin: 5px 0; font-weight: 900; text-shadow: 0 0 25px rgba(0,242,255,0.3); }
        .lvl-txt { color: var(--accent); font-weight: bold; letter-spacing: 2px; font-size: 14px; }
        #skin-label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        /* Кликер-Элемент (Монета со скинами) */
        #coin-wrap { width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .digital-coin { 
            width: 200px; height: 200px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 70px; transition: transform 0.05s; text-shadow: 0 2px 10px rgba(0,0,0,0.5); border: 6px solid;
        }
        #coin-wrap:active .digital-coin { transform: scale(0.92); }
        
        /* Стили скинов */
        .skin-wood { background: radial-gradient(circle, #a0522d 0%, #5c2e16 100%) !important; border-color: #3d1e0e !important; box-shadow: 0 0 20px rgba(139,69,19,0.4); }
        .skin-iron { background: radial-gradient(circle, #ffffff 0%, #606c76 100%) !important; border-color: #b0c4de !important; box-shadow: 0 0 25px rgba(255,255,255,0.25); }
        .skin-gold { background: radial-gradient(circle, #ffe566 0%, #cc9900 100%) !important; border-color: #ffcc00 !important; box-shadow: 0 0 35px rgba(255,215,0,0.4); }
        .skin-diamond { background: radial-gradient(circle, #e6ffff 0%, #00a8cc 100%) !important; border-color: #00f2ff !important; box-shadow: 0 0 45px rgba(0,242,255,0.5); }
        .skin-cosmic { 
            background: radial-gradient(circle, #3a0066 0%, #0f001a 100%) !important; border-color: #b300ff !important; 
            box-shadow: 0 0 50px rgba(179,0,255,0.6); animation: cosmic-glow 1.5s infinite alternate; 
        }

        @keyframes cosmic-glow {
            0% { box-shadow: 0 0 30px rgba(179,0,255,0.4); transform: scale(1); }
            100% { box-shadow: 0 0 60px rgba(179,0,255,0.8); transform: scale(1.02); }
        }

        .rage-active .digital-coin { animation: pulse-rage 0.1s infinite alternate !important; border-color: var(--rage) !important; box-shadow: 0 0 60px var(--rage) !important; }
        @keyframes pulse-rage { 0% { transform: scale(1); } 100% { transform: scale(0.95); } }

        /* Магазин */
        .shop { width: 380px; background: var(--panel); border-left: 2px solid #1f2937; display: flex; flex-direction: column; padding: 15px; }
        .shop-header { text-align: center; color: var(--accent); margin: 0 0 15px 0; letter-spacing: 2px; font-size: 20px; }
        .shop-container { flex: 1; overflow-y: auto; padding-right: 3px; }

        /* Карточки товаров */
        .item { background: #1c2128; border: 1px solid #30363d; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .item-info { display: flex; justify-content: space-between; align-items: center; }
        .item b { color: var(--accent); font-size: 15px; }
        .item .count-badge { background: #21262d; padding: 2px 8px; border-radius: 20px; font-size: 12px; color: #8b949e; border: 1px solid #30363d; }
        .item small { color: #8b949e; margin: 4px 0 8px 0; display: block; }
        .item button { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; background: #238636; color: white; transition: background 0.2s; }
        .item button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

        .reborn-card { background: linear-gradient(135deg, #1b160b 0%, #2d2206 100%); border: 1px solid var(--gold); padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; }
        .reborn-card b { color: var(--gold); font-size: 16px; display: block; margin-bottom: 4px; }
        .reborn-card button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; background: var(--gold); color: black; }
        .reborn-card button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

        /* Всплывающие цифры */
        .pop { position: absolute; pointer-events: none; animation: floatUp 0.5s ease-out forwards; font-weight: 900; font-size: 26px; z-index: 200; text-shadow: 2px 2px 0 #000; text-align: center; width: 100px; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }

        #notify-msg { position: absolute; top: 30px; background: rgba(0, 242, 255, 0.9); color: black; padding: 8px 20px; border-radius: 50px; font-weight: bold; opacity: 0; transition: opacity 0.3s; z-index: 1000; pointer-events: none; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; }
            .rage-container { left: 10px; height: 160px; }
            .shop { width: 100%; border-left: none; border-top: 2px solid #1f2937; height: 50vh; }
            #coin-wrap { width: 220px; height: 220px; }
            .digital-coin { width: 150px; height: 150px; font-size: 55px; }
        }
    </style>
    <script>
        window.onerror = function(msg, url, line) {
            var box = document.getElementById('debug-box');
            if(box) {
                box.style.display = 'block';
                box.innerText = "Ошибка: " + msg + " (Строка: " + line + ")";
            }
            return false;
        };
    </script>
</head>
<body>

<div id="debug-box"></div>
<div id="notify-msg">НОВЫЙ УРОВЕНЬ!</div>
<div class="rage-container"><div id="rage-fill"></div></div>

<div class="main">
    <div class="stats-top">
        <div id="lvl-txt" class="lvl-txt">УРОВЕНЬ 1</div>
        <div id="skin-label">Скин: Дерево</div>
        <h1 id="money">$0</h1>
    </div>
    
    <div class="xp-wrapper"><div id="xp-bar"></div></div>

    <div id="coin-wrap" onclick="handleInteraction(event)">
        <div id="coin" class="digital-coin">🪵</div>
    </div>
    
    <p style="opacity: 0.5; font-size: 13px; margin: 5px 0;">
        Сила тапа: <span id="pwr-val" style="color:var(--accent)">1</span> 
        <span id="mult-val" style="color:var(--gold); margin-left:5px;"></span>
    </p>
</div>

<div class="shop">
    <div class="shop-header">МАГАЗИН</div>
    
    <div class="reborn-card">
        <b>ПЕРЕРОЖДЕНИЕ</b>
        <small id="reborn-desc" style="display:block; margin-bottom:10px; color:#c9d1d9;">Загрузка...</small>
        <button id="reborn-btn" onclick="triggerReborn()" disabled>БЛОКИРОВАНО</button>
    </div>

    <div class="shop-container" id="shop-list"></div>
    <button onclick="hardReset()" style="margin-top:10px; opacity:0.2; background:none; color:white; border:none; cursor:pointer; font-size:11px; padding:5px;">Очистить сохранения</button>
</div>

<script>
    var game = {
        money: 0, pwr: 1, xp: 0, lvl: 1, nextXp: 100,
        rage: 0, isRage: false, prestigeCount: 0, upgrades: []
    };

    var lastTapTime = 0;

    var defaultUpgrades = [
        { name: "Медный палец", cost: 10, bonus: 1, count: 0, costMult: 1.28 },
        { name: "Железный клик", cost: 120, bonus: 6, count: 0, costMult: 1.32 },
        { name: "Стальной курсор", cost: 600, bonus: 25, count: 0, costMult: 1.35 },
        { name: "Бронзовый буст", cost: 3200, bonus: 110, count: 0, costMult: 1.38 },
        { name: "Золотой зажим", cost: 15000, bonus: 480, count: 0, costMult: 1.42 },
        { name: "Рубиновый тап", cost: 85000, bonus: 2200, count: 0, costMult: 1.45 },
        { name: "Сапфировый кликер", cost: 450000, bonus: 9800, count: 0, costMult: 1.48 },
        { name: "Алмазный удар", cost: 2400000, bonus: 45000, count: 0, costMult: 1.50 },
        { name: "Аметистовый взрыв", cost: 14000000, bonus: 210000, count: 0, costMult: 1.53 },
        { name: "Платиновое касание", cost: 80000000, bonus: 990000, count: 0, costMult: 1.56 },
        { name: "Квантовый щелчок", cost: 500000000, bonus: 4800000, count: 0, costMult: 1.60 },
        { name: "Космическая сила", cost: 4000000000, bonus: 25000000, count: 0, costMult: 1.65 }
    ];

    function initShop() {
        game.upgrades = JSON.parse(JSON.stringify(defaultUpgrades));
    }

    function startLoading() {
        initShop();
        try {
            var saved = localStorage.getItem('runUltimateSaveV9');
            if(saved) {
                var parsed = JSON.parse(saved);
                if(parsed && parsed.upgrades && parsed.upgrades.length === defaultUpgrades.length) {
                    game.money = parsed.money ?? 0;
                    game.pwr = parsed.pwr ?? 1;
                    game.xp = parsed.xp ?? 0;
                    game.lvl = parsed.lvl ?? 1;
                    game.nextXp = parsed.nextXp ?? 100;
                    game.prestigeCount = parsed.prestigeCount ?? 0;
                    game.upgrades = parsed.upgrades;
                }
            }
        } catch(e) {
            console.log("Сохранения недоступны.");
        }
        
        // Постоянный цикл падения ярости (срабатывает, когда игрок бездействует)
        setInterval(function() {
            var timePassed = Date.now() - lastTapTime;
            
            // Если игрок активно кликает (пауза меньше 250мс) — шкала вообще не падает вниз
            if (timePassed < 250) return; 

            if (game.rage > 0) {
                if (game.isRage) {
                    game.rage -= 1.5; // Скорость падения шкалы в режиме комбо
                    
                    // ГЛАВНОЕ ПРАВИЛО: Если ярость упала ниже 75%, режим x2 отключается
                    if (game.rage < 75) {
                        game.isRage = false;
                        document.body.classList.remove('rage-active');
                    }
                } else {
                    game.rage = Math.max(game.rage - 1.2, 0); // Обычное плавное падение вне режима х2
                }
                updateRageBar();
            }
        }, 50);

        updateUI();
    }

    function handleInteraction(e) {
        lastTapTime = Date.now();

        // Ярость заполняется от кликов ВСЕГДА (даже во время падения или активного х2 режима)
        game.rage = Math.min(game.rage + 5, 100);

        // Включение режима x2 происходит строго на 100% шкалы
        if (game.rage >= 100 && !game.isRage) {
            game.isRage = true;
            document.body.classList.add('rage-active');
            notify("ЯРОСТЬ Х2!");
        }

        var totalMult = (1 + game.prestigeCount); 
        if (game.isRage) totalMult *= 2;

        var crit = Math.random() < 0.12;
        if (crit) totalMult *= 5;

        var finalValue = game.pwr * totalMult;
        game.money += finalValue;

        game.xp += 10;
        if (game.xp >= game.nextXp) {
            game.xp = 0;
            game.lvl++;
            game.nextXp = Math.floor(game.lvl * 150);
            notify("НОВЫЙ УРОВЕНЬ: " + game.lvl);
        }

        createPopText(e, (crit ? "🔥 x5 " : "+") + Math.floor(finalValue).toLocaleString(), crit);
        updateUI();
        saveGame();
    }

    function updateRageBar() {
        var bar = document.getElementById('rage-fill');
        if (bar) bar.style.height = game.rage + "%";
    }

    function createPopText(e, txt, isCrit) {
        var wrap = document.getElementById('coin-wrap');
        if(!wrap) return;
        
        var el = document.createElement('div');
        el.className = 'pop';
        
        var textColor = "white";
        if (isCrit) { textColor = "var(--gold)"; }
        else if (game.isRage) { textColor = "var(--rage)"; }
        el.style.color = textColor;
        
        el.innerText = txt;
        el.style.left = "35%";
        el.style.top = "20%";
        
        wrap.appendChild(el);
        setTimeout(function() { el.remove(); }, 500);
    }

    window.buyUpgrade = function(index) {
        var u = game.upgrades[index];
        if (game.money >= u.cost) {
            game.money -= u.cost;
            game.pwr += u.bonus;
            u.count++;
            u.cost = Math.floor(u.cost * u.costMult);
            updateUI();
            saveGame();
        }
    };

    window.triggerReborn = function() {
        var nextRebornLvl = 15 + (game.prestigeCount * 5);
        if (game.lvl >= nextRebornLvl) {
            game.prestigeCount++;
            game.money = 0;
            game.pwr = 1;
            game.lvl = 1;
            game.xp = 0;
            game.nextXp = 100;
            initShop();
            notify("ПЕРЕРОЖДЕНИЕ!");
            updateUI();
            saveGame();
        }
    };

    function updateSkin() {
        var c = document.getElementById('coin');
        var label = document.getElementById('skin-label');
        if (!c) return;
        
        c.className = "digital-coin";
        
        if (game.lvl >= 36) {
            c.classList.add('skin-cosmic');
            c.innerText = "🌌";
            if(label) label.innerText = "Скин: Космос";
        } else if (game.lvl >= 21) {
            c.classList.add('skin-diamond');
            c.innerText = "💎";
            if(label) label.innerText = "Скин: Алмаз";
        } else if (game.lvl >= 13) {
            c.classList.add('skin-gold');
            c.innerText = "👑";
            if(label) label.innerText = "Скин: Золото";
        } else if (game.lvl >= 6) {
            c.classList.add('skin-iron');
            c.innerText = "🪙";
            if(label) label.innerText = "Скин: Железо";
        } else {
            c.classList.add('skin-wood');
            c.innerText = "🪵";
            if(label) label.innerText = "Скин: Дерево";
        }
    }

    function updateUI() {
        var moneyEl = document.getElementById('money');
        var lvlEl = document.getElementById('lvl-txt');
        var pwrEl = document.getElementById('pwr-val');
        var multEl = document.getElementById('mult-val');
        var xpBarEl = document.getElementById('xp-bar');

        if(moneyEl) moneyEl.innerText = "$" + Math.floor(game.money).toLocaleString();
        if(lvlEl) lvlEl.innerText = "УРОВЕНЬ " + game.lvl;
        
        var totalMult = (1 + game.prestigeCount);
        if(pwrEl) pwrEl.innerText = game.pwr.toLocaleString();
        
        if(multEl) {
            if (game.prestigeCount > 0) {
                multEl.innerText = "(Множитель: x" + totalMult + ")";
            } else {
                multEl.innerText = "";
            }
        }
        
        var xpPercent = (game.xp / game.nextXp) * 100;
        if(xpBarEl) xpBarEl.style.width = xpPercent + "%";
        
        updateRageBar();
        updateSkin();

        var nextRebornLvl = 15 + (game.prestigeCount * 5);
        var rebornBtn = document.getElementById('reborn-btn');
        var rebornDesc = document.getElementById('reborn-desc');
        
        if (rebornDesc) rebornDesc.innerText = "Требуется уровень: " + nextRebornLvl + " (Текущий: " + game.lvl + ")";
        
        if (rebornBtn) {
            if (game.lvl >= nextRebornLvl) {
                rebornBtn.disabled = false;
                rebornBtn.innerText = "ПЕРЕРОЖДЕНИЕ (на x" + (totalMult + 1) + ")";
            } else {
                rebornBtn.disabled = true;
                rebornBtn.innerText = "БЛОКИРОВАНО";
            }
        }

        var htmlHtml = "";
        game.upgrades.forEach(function(u, i) {
            var canBuy = game.money >= u.cost;
            var isDisabled = canBuy ? "" : "disabled";
            
            htmlHtml += '<div class="item">' +
                        '<div class="item-info">' +
                        '<b>' + u.name + '</b>' +
                        '<span class="count-badge">Ур. ' + u.count + '</span>' +
                        '</div>' +
                        '<small>Эффект: +' + (u.bonus * totalMult).toLocaleString() + ' к клику</small>' +
                        '<button onclick="buyUpgrade(' + i + ')" ' + isDisabled + '>$' + u.cost.toLocaleString() + '</button>' +
                        '</div>';
        });
        
        var shopList = document.getElementById('shop-list');
        if(shopList) shopList.innerHTML = htmlHtml;
    }

    function saveGame() { 
        try {
            localStorage.setItem('runUltimateSaveV9', JSON.stringify(game)); 
        } catch(e) {}
    }

    function notify(msg) {
        var n = document.getElementById('notify-msg');
        if(!n) return;
        n.innerText = msg;
        n.style.opacity = "1";
        setTimeout(function() { n.style.opacity = "0"; }, 1500);
    }

    function hardReset() {
        try { localStorage.clear(); } catch(e) {}
        location.reload();
    }

    startLoading();
</script>
</body>
</html>
