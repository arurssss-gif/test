<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artur's Gaming Hub Pro</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #fbbf24; --green: #22c55e; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        nav { background: var(--panel); display: flex; justify-content: center; gap: 15px; padding: 15px; border-bottom: 2px solid var(--accent); z-index: 100; }
        nav button { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        nav button.active { background: var(--accent); color: var(--bg); }

        .tab { display: none; flex: 1; width: 100%; height: 100%; position: relative; }
        .tab.active { display: flex; }

        /* CLICKER & SIDEBAR SHOP */
        .clicker-layout { display: flex; width: 100%; height: 100%; }
        .game-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #mainAsset { font-size: 120px; cursor: pointer; transition: 0.1s; user-select: none; filter: drop-shadow(0 0 20px rgba(251,191,36,0.3)); }
        #mainAsset:active { transform: scale(0.8); }
        
        .sidebar { width: 350px; background: var(--panel); border-left: 1px solid #334155; padding: 20px; overflow-y: auto; }
        .upgrade-card { background: #334155; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #475569; transition: 0.2s; }
        .upgrade-card:hover { border-color: var(--accent); }
        .buy-btn { width: 100%; padding: 10px; background: var(--green); border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .buy-btn:disabled { background: #64748b; cursor: not-allowed; opacity: 0.5; }

        /* DINO SYSTEM */
        #dinoBox { width: 600px; height: 250px; border-bottom: 4px solid white; position: relative; overflow: hidden; background: #1e293b; margin: auto; }
        #dinoHero { position: absolute; bottom: 0; left: 50px; font-size: 50px; transform: scaleX(-1); transition: bottom 0.1s; }
        #cactus { position: absolute; bottom: 0; right: -60px; font-size: 40px; }

        /* MOSQUITO SYSTEM */
        #jumpZone { width: 400px; height: 550px; background: #0ea5e9; border: 5px solid white; position: relative; overflow: hidden; margin: auto; cursor: crosshair; }
        #player { position: absolute; font-size: 35px; width: 40px; height: 40px; pointer-events: none; }
        .cloud { position: absolute; width: 80px; height: 20px; background: white; border-radius: 15px; text-align: center; line-height: 20px; color: #0ea5e9; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <button id="t1" class="active" onclick="switchTab('clicker')">ULTRA CLICKER</button>
    <button id="t2" onclick="switchTab('dino')">REX RUNNER</button>
    <button id="t3" onclick="switchTab('cloud')">MOSQUITO JUMP</button>
</nav>

<div id="clicker" class="tab active">
    <div class="clicker-layout">
        <div class="game-zone">
            <div style="text-align: center;">
                <h2 style="margin:0; color:var(--accent)">Level <span id="lvl">1</span></h2>
                <div id="mainAsset" onclick="doClick()">🪙</div>
                <h1 id="balText" style="font-size: 4rem; margin:10px 0;">$0</h1>
                <p>Click: +<span id="cpc">1</span> | Idle: +<span id="cps">0</span>/s</p>
            </div>
        </div>
        <div class="sidebar">
            <h2 style="text-align:center; color:var(--accent)">SHOP</h2>
            <div class="upgrade-card">
                <b>Copper Mouse</b> (+1 Click)<br>
                <button class="buy-btn" id="b1" onclick="buy('c', 1, 15)">Buy for $15</button>
            </div>
            <div class="upgrade-card">
                <b>Gold Finger</b> (+10 Click)<br>
                <button class="buy-btn" id="b2" onclick="buy('c', 10, 150)">Buy for $150</button>
            </div>
            <div class="upgrade-card">
                <b>Auto Bot</b> (+2/sec)<br>
                <button class="buy-btn" id="b3" onclick="buy('s', 2, 100)">Buy for $100</button>
            </div>
            <div class="upgrade-card">
                <b>Money Printing</b> (+50/sec)<br>
                <button class="buy-btn" id="b4" onclick="buy('s', 50, 1000)">Buy for $1000</button>
            </div>
            <div class="upgrade-card">
                <b>Diamond Drill</b> (+100 Click)<br>
                <button class="buy-btn" id="b5" onclick="buy('c', 100, 2500)">Buy for $2500</button>
            </div>
        </div>
    </div>
</div>

<div id="dino" class="tab">
    <div style="text-align:center; width:100%;">
        <h1>Score: <span id="dScore">0</span></h1>
        <div id="dinoBox" onclick="jumpDino()">
            <div id="dinoHero">🦖</div>
            <div id="cactus">🌵</div>
        </div>
        <p>Press SPACE or Click to Jump!</p>
    </div>
</div>

<div id="cloud" class="tab">
    <div style="text-align:center; width:100%;">
        <h1>Height: <span id="jScore">0</span></h1>
        <div id="jumpZone">
            <div id="player">🦟</div>
        </div>
        <p>Use ARROWS or MOVE MOUSE to fly!</p>
    </div>
</div>
