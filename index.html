<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RUN - ARTUR STABLE</title>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        nav { background: #10141b; padding: 20px; border-bottom: 2px solid #00f2ff; }
        button { background: #1a1f26; color: white; border: 1px solid #333; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .tab { display: none; padding: 20px; }
        .active { display: block !important; }
        #coin { font-size: 100px; cursor: pointer; user-select: none; margin: 30px; display: inline-block; }
        #coin:active { transform: scale(0.9); }
        .shop-box { max-width: 300px; margin: 0 auto; background: #10141b; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<nav>
    <button onclick="st('c')">КЛИКЕР</button>
    <button onclick="st('d')">ДИНО</button>
</nav>

<div id="t-c" class="tab active">
    <h1 id="bal">$0</h1>
    <div id="coin" onclick="tap()">🪙</div>
    <div class="shop-box">
        <h3>МАГАЗИН</h3>
        <button onclick="buy()">КУПИТЬ АПГРЕЙД ($10)</button>
    </div>
</div>

<div id="t-d" class="tab">
    <h1>ДИНОЗАВРИК</h1>
    <div id="zone" onclick="jump()" style="width:300px; height:150px; border:2px solid white; margin: 0 auto; position:relative; overflow:hidden;">
        <div id="dino" style="position:absolute; bottom:0; left:20px; font-size:30px;">🦖</div>
    </div>
</div>

<script>
    let money = 0;
    let power = 1;

    // КЛИКЕР
    window.tap = function() {
        money += power;
        document.getElementById('bal').innerText = "$" + money;
    };

    window.buy = function() {
        if(money >= 10) {
            money -= 10;
            power += 1;
            document.getElementById('bal').innerText = "$" + money;
            alert("Прокачано!");
        }
    };

    // ПЕРЕКЛЮЧЕНИЕ
    window.st = function(id) {
        document.getElementById('t-c').classList.remove('active');
        document.getElementById('t-d').classList.remove('active');
        document.getElementById('t-' + id).classList.add('active');
    };

    // ДИНО
    let dy = 0;
    window.jump = function() {
        if(dy === 0) {
            dy = 100;
            document.getElementById('dino').style.bottom = dy + "px";
            setTimeout(() => {
                dy = 0;
                document.getElementById('dino').style.bottom = "0px";
            }, 500);
        }
    };
</script>
</body>
</html>
