<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Artur Game Hub</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        nav { background: #1e293b; padding: 10px; border-bottom: 2px solid gold; display: flex; justify-content: center; gap: 10px; }
        button { cursor: pointer; padding: 10px; border: 1px solid gold; background: #334155; color: gold; font-weight: bold; border-radius: 5px; }
        .tab { display: none; padding: 20px; }
        .active { display: block; }
        #coin { font-size: 100px; cursor: pointer; user-select: none; margin: 20px; display: inline-block; }
        #coin:active { transform: scale(0.9); }
        .grid { display: flex; justify-content: space-around; flex-wrap: wrap; }
        .panel { width: 250px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin: 10px; }
        .upg-btn { width: 100%; background: #22c55e; color: white; border: none; padding: 10px; margin-top: 10px; cursor: pointer; border-radius: 5px; }
        .upg-btn:disabled { background: #444; cursor: not-allowed; }
        .canvas { width: 600px; height: 250px; background: #1e293b; border: 2px solid white; position: relative; overflow: hidden; margin: 20px auto; }
        #dino { position: absolute; bottom: 0; left: 50px; font-size: 40px; }
        .cactus { position: absolute; bottom: 0; right: -50px; font-size: 30px; }
    </style>
</head>
<body>

<nav>
    <button onclick="showTab('c')">КЛИКЕР</button>
    <button onclick="showTab('d')">ДИНО</button>
</nav>

<div id="tc" class="tab active">
    <h1>Баланс: $<span id="balance">0</span></h1>
    <div id="coin" onclick="handleTap()">🪙</div>
    <p>За клик: +<span id="cpc">1</span></p>
    
    <div class="grid">
        <div class="panel">
            <h3>Топ игроков</h3>
            <div id="leaderboard"></div>
        </div>
        <div class="panel">
            <h3>Магазин (30 уровней)</h3>
            <div id="shop"></div>
        </div>
    </div>
</div>

<div id="td" class="tab">
    <h1>Счет: <span id="score">0</span></h1>
    <div class="canvas" onclick="dinoJump()">
        <div id="dino">🦖</div>
        <div id="obstacles"></div>
    </div>
</div>

<script>
    let money = 0;
    let power = 1;
    let upgrades = [];

    // Создаем 30 улучшений
    for(let i=1; i<=30; i++) {
        upgrades.push({ name: "Уровень " + i, price: Math.floor(10 * Math.pow(1.5, i)), boost: i * 2 });
    }

    function showTab(id) {
        document.getElementById('tc').classList.remove('active');
        document.getElementById('td').classList.remove('active');
        document.getElementById('t' + id).classList.add('active');
        if(id === 'd') startDino(); else stopDino();
    }

    function handleTap() {
        money += power;
        refreshUI();
    }

    function buyUpgrade(i) {
        if(money >= upgrades[i].price) {
            money -= upgrades[i].price;
            power += upgrades[i].boost;
            upgrades[i].price *= 2;
            refreshUI();
        }
    }

    function refreshUI() {
        document.getElementById('balance').innerText = Math.floor(money);
        document.getElementById('cpc').innerText = power;

        // Лидерборд
        let lbHtml = "1. Artur (Вы): $" + Math.floor(money) + "<br>";
        for(let i=2; i<=10; i++) lbHtml += i + ". Player_" + i + ": $" + Math.floor(money / i) + "<br>";
        document.getElementById('leaderboard').innerHTML = lbHtml;

        // Магазин
        let shopHtml = "";
        upgrades.forEach((u, i) => {
            shopHtml += `<div style="margin-bottom:10px; border-bottom:1px solid #444; padding-bottom:5px;">
                ${u.name} (+$${u.boost})<br>
                <button class="upg-btn" onclick="buyUpgrade(${i})" ${money < u.price ? 'disabled' : ''}>Купить: $${u.price}</button>
            </div>`;
        });
        document.getElementById('shop').innerHTML = shopHtml;
    }

    // ДИНОЗАВРИК
    let dinoTimer, score = 0, isJumping = false;
    function dinoJump() {
        if(!isJumping) {
            isJumping = true;
            let d = document.getElementById('dino');
            d.style.transition = "0.4s";
            d.style.bottom = "120px";
            setTimeout(() => { d.style.bottom = "0"; isJumping = false; }, 400);
        }
    }

    function startDino() {
        score = 0;
        document.getElementById('obstacles').innerHTML = "";
        dinoTimer = setInterval(() => {
            score++;
            document.getElementById('score').innerText = score;
            if(Math.random() < 0.02) {
                let c = document.createElement('div');
                c.className = 'cactus';
                c.innerText = Math.random() > 0.5 ? '🌵' : '🌵🌵';
                c.style.right = "-50px";
                document.getElementById('obstacles').appendChild(c);
            }
            document.querySelectorAll('.cactus').forEach(c => {
                let r = parseInt(c.style.right) || -50;
                c.style.right = (r + 7) + "px";
                if(r > 500 && r < 540 && parseInt(document.getElementById('dino').style.bottom) < 40) {
                    alert("Проиграл! Счет: " + score);
                    startDino();
                }
                if(r > 650) c.remove();
            });
        }, 30);
    }
    function stopDino() { clearInterval(dinoTimer); }

    // Запуск начального экрана
    refreshUI();
</script>
</body>
</html>
