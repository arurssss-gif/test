<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN - ULTIMATE CLICKER</title>
    <style>
        :root { --accent: #00f2ff; --bg: #05070a; --panel: #0d1117; }
        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; display: flex; height: 100vh; overflow: hidden; 
        }
        
        .side-run { position: fixed; left: -10px; top: 50%; transform: translateY(-50%) rotate(-90deg); font-size: 100px; font-weight: 900; color: rgba(255,255,255,0.02); pointer-events: none; }
        .watermark { position: fixed; bottom: 20px; left: 20px; font-size: 20px; font-weight: bold; color: rgba(0,242,255,0.2); letter-spacing: 5px; }

        .main { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: radial-gradient(circle at center, #111821 0%, #05070a 100%);
        }

        .shop { 
            width: 380px; background: var(--panel); border-left: 2px solid #1f2937; 
            display: flex; flex-direction: column; padding: 20px; overflow-y: auto;
        }

        #coin { 
            font-size: 160px; cursor: pointer; user-select: none; transition: transform 0.1s; 
            filter: drop-shadow(0 0 30px rgba(0,242,255,0.1)); margin: 20px;
        }
        #coin:active { transform: scale(0.85); }

        .xp-container { width: 350px; height: 14px; background: #161b22; border-radius: 20px; margin: 20px 0; border: 1px solid #30363d; overflow: hidden; }
        #xp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2ff, #7000ff); transition: 0.3s; }

        h1#money { font-size: 70px; margin: 10px 0; text-shadow: 0 0 20px rgba(0,242,255,0.3); }
        h2#lvl { color: var(--accent); letter-spacing: 2px; }

        .item { 
            background: #1c2128; border: 1px solid #30363d; padding: 15px; border-radius: 12px; 
            margin-bottom: 12px;
        }
        .item b { display: block; margin-bottom: 8px; font-size: 16px; }
        .item button { 
            width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; 
            cursor: pointer; background: #238636; color: white; transition: 0.2s;
        }
        .item button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        
        #msg { position: absolute; top: 40px; background: var(--accent); color: black; padding: 10px 25px; border-radius: 30px; font-weight: bold; opacity: 0; transition: 0.5s; z-index: 100; }
    </style>
</head>
<body>

<div id="msg">LEVEL UP!</div>
<div class="side-run">RUN</div>
<div class="watermark">arurs</div>

<div class="main">
    <h2 id="lvl">LEVEL 1</h2>
    <div class="xp-container"><div id="xp-bar"></div></div>
    <div id="coin" onclick="clickCoin()">🪙</div>
    <h1 id="money">$0</h1>
    <p>Клик: +<span id="click-power">1</span></p>
</div>

<div class="shop">
    <h2 style="text-align: center; color: var(--accent);">МАГАЗИН</h2>
    <div id="items-list">
        </div>
</div>

<script>
    let money = 0;
    let power = 1;
    let xp = 0;
    let lvl = 1;
    let nextLvlXp = 100;

    // Генерируем 30 апгрейдов
    const upgrades = [];
    for (let i = 1; i <= 30; i++) {
        upgrades.push({
            name: "Улучшение #" + i,
            cost: Math.floor(20 * Math.pow(1.5, i)),
            bonus: i * 3
        });
    }

    window.clickCoin = function() {
        money += power;
        xp += 10;
        
        if (xp >= nextLvlXp) {
            xp = 0;
            lvl++;
            nextLvlXp = Math.floor(nextLvlXp * 1.6);
            
            const coinEl = document.getElementById('coin');
            if (lvl >= 20) coinEl.innerText = "💎";
            else if (lvl >= 15) coinEl.innerText = "👑";
            else if (lvl >= 10) coinEl.innerText = "💰";
            else if (lvl >= 5) coinEl.innerText = "💵";

            showNotify("LEVEL UP: " + lvl);
        }
        updateUI();
    }

    window.buyUpgrade = function(i) {
        let u = upgrades[i];
        if (money >= u.cost) {
            money -= u.cost;
            power += u.bonus;
            u.cost = Math.floor(u.cost * 1.7); // Цена растет
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById('money').innerText = "$" + Math.floor(money);
        document.getElementById('lvl').innerText = "LEVEL " + lvl;
        document.getElementById('click-power').innerText = power;
        document.getElementById('xp-bar').style.width = (xp / nextLvlXp * 100) + "%";

        let html = "";
        upgrades.forEach((u, index) => {
            const canBuy = money >= u.cost;
            html += `
                <div class="item">
                    <b>${u.name} <span style="color:var(--accent)">+${u.bonus}</span></b>
                    <button onclick="buyUpgrade(${index})" ${canBuy ? '' : 'disabled'}>
                        $${u.cost.toLocaleString()}
                    </button>
                </div>
            `;
        });
        document.getElementById('items-list').innerHTML = html;
    }

    function showNotify(text) {
        const el = document.getElementById('msg');
        el.innerText = text; el.style.opacity = "1";
        setTimeout(() => el.style.opacity = "0", 1500);
    }

    // ВАЖНО: Запускаем отрисовку сразу при загрузке
    updateUI();
</script>

</body>
</html>
