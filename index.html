<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RUN - ARTUR FINAL FIX</title>
    <style>
        :root { --accent: #00f2ff; --bg: #05070a; --panel: #10141b; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; }
        
        /* Брендинг */
        .side-run { position: fixed; left: -10px; top: 50%; transform: translateY(-50%) rotate(-90deg); font-size: 80px; font-weight: 900; color: rgba(255,255,255,0.05); pointer-events: none; }
        .watermark { position: fixed; bottom: 10px; right: 10px; color: rgba(0,242,255,0.3); font-weight: bold; }

        nav { background: var(--panel); padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: center; gap: 10px; }
        nav button { background: #1a1f26; border: 1px solid #333; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        nav button.active { background: var(--accent); color: black; }

        .tab { display: none; padding: 20px; flex-direction: column; align-items: center; }
        .tab.active { display: flex; }

        #coin { font-size: 120px; cursor: pointer; user-select: none; transition: 0.1s; margin: 20px; display: inline-block; }
        #coin:active { transform: scale(0.8); }

        .xp-bar { width: 300px; height: 10px; background: #222; border-radius: 5px; margin: 10px auto; overflow: hidden; }
        #xp-fill { width: 0%; height: 100%; background: var(--accent); transition: 0.3s; }
    </style>
</head>
<body>

<div class="side-run">RUN</div>
<div class="watermark">arurs</div>

<nav>
    <button onclick="changeTab('c')" id="btn-c" class="active">КЛИКЕР</button>
    <button onclick="changeTab('d')" id="btn-d">ДИНО</button>
    <a href="https://www.tiktok.com/@arursss" target="_blank" style="background:#ff0050; color:white; padding:10px; text-decoration:none; border-radius:5px;">TIKTOK</a>
</nav>

<div id="tab-c" class="tab active">
    <h2 id="lvl-txt">УРОВЕНЬ 1</h2>
    <div class="xp-bar"><div id="xp-fill"></div></div>
    <div id="coin" onclick="handleTap()">🪙</div>
    <h1 id="money-txt">$0</h1>
</div>

<div id="tab-d" class="tab">
    <h1>ДИНОЗАВРИК</h1>
    <div style="width:100%; height:200px; border:1px solid #333; position:relative; overflow:hidden;">
        <div id="dino" style="position:absolute; bottom:0; left:20px; font-size:40px;">🦖</div>
    </div>
    <p>Режим в отладке...</p>
</div>

<script>
    // Глобальные переменные
    window.money = 0;
    window.xp = 0;
    window.lvl = 1;

    // Функция переключения вкладок
    window.changeTab = function(id) {
        console.log("Переключаю на:", id);
        // Скрываем все
        document.getElementById('tab-c').classList.remove('active');
        document.getElementById('tab-d').classList.remove('active');
        // Убираем подсветку кнопок
        document.getElementById('btn-c').classList.remove('active');
        document.getElementById('btn-d').classList.remove('active');
        
        // Показываем нужную
        document.getElementById('tab-' + id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    };

    // Функция клика
    window.handleTap = function() {
        window.money++;
        window.xp += 10;
        
        if(window.xp >= 100) {
            window.xp = 0;
            window.lvl++;
            alert("НОВЫЙ УРОВЕНЬ!");
        }
        
        // Обновляем текст
        document.getElementById('money-txt').innerText = "$" + window.money;
        document.getElementById('lvl-txt').innerText = "УРОВЕНЬ " + window.lvl;
        document.getElementById('xp-fill').style.width = window.xp + "%";
    };

    console.log("Скрипт загружен полностью");
</script>
</body>
</html>
