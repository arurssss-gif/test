<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN - BEYOND CLICKER</title>
    <style>
        :root { --accent: #00f2ff; --bg: #05070a; --panel: #0d1117; --rage: #ff0050; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; user-select: none; }
        
        .side-run { position: fixed; left: -10px; top: 50%; transform: translateY(-50%) rotate(-90deg); font-size: 120px; font-weight: 900; color: rgba(255,255,255,0.02); pointer-events: none; }
        .watermark { position: fixed; bottom: 20px; left: 100px; font-size: 20px; font-weight: bold; color: rgba(0,242,255,0.15); letter-spacing: 5px; }

        /* Шкала ярости (X2) */
        .rage-container { position: fixed; left: 30px; top: 50%; transform: translateY(-50%); width: 25px; height: 300px; background: #161b22; border: 2px solid #30363d; border-radius: 15px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #rage-fill { position: absolute; bottom: 0; width: 100%; height: 0%; background: linear-gradient(0deg, #ff0050, #ff7b00); transition: height 0.2s; box-shadow: 0 0 15px var(--rage); }
        .rage-label { position: absolute; left: 65px; top: 50%; transform: translateY(-50%) rotate(-90deg); font-weight: bold; color: var(--rage); letter-spacing: 2px; font-size: 14px; }

        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .shop { width: 420px; background: var(--panel); border-left: 2px solid #1f2937; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }

        /* Гигантская монета */
        #coin-wrap { position: relative; width: 400px; height: 400px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #coin { font-size: 240px; transition: transform 0.05s, filter 0.2s; filter: drop-shadow(0 0 50px rgba(0,242,255,0.1)); z-index: 10; }
        #coin:active { transform: scale(0.92); }
        
        /* Эффект ярости для монеты */
        .rage-active #coin { filter: drop-shadow(0 0 60px var(--rage)) !important; animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, -1px); } }

        .xp-box { width: 400px; height: 8px; background: #161b22; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #xp-bar { width: 0%; height: 100%; background: var(--accent); transition: 0.3s; }

        h1#money { font-size: 80px; margin: 10px 0; font-weight: 900; text-shadow: 0 0 20px rgba(0,242,255,0.2); }

        .item { background: #1c2128; border: 1px solid #30363d; padding: 15px; border-radius: 12px; margin-bottom: 12px; }
        .item b { color: var(--accent); font-size: 18px; }
        .item button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #238636; color: white; margin-top: 10px; }
        .item button:disabled { background: #21262d; color: #484f58; }

        .pop { position: absolute; pointer-events: none; animation: popUp 0.6s ease-out forwards; font-weight: 900; font-size: 24px; z-index: 100; }
        @keyframes popUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-120px) scale(1.5); } }

        #msg { position: absolute; top: 40px; background: white; color: black; padding: 10px 30px; border-radius: 50px; font-weight: bold; opacity: 0; transition: 0.4s; z-index: 1000; }
    </style>
</head>
<body id="body">

<div id="msg">LEVEL UP!</div>
<div class="side-run">RUN</div>
<div class="watermark">arurs</div>

<div class="rage-container">
    <div id="rage-fill"></div>
    <div class="rage-label">RAGE MODE X2</div>
</div>

<div class="main">
    <div id="lvl" style="font-weight: bold; color: var(--accent);">LVL 1</div>
    <div class="xp-box"><div id="xp-bar"></div></div>
    
    <h1 id="money">$0</h1>

    <div id="coin-wrap" onclick="handleTap(event)">
        <div id="coin">🪙</div>
    </div>
    
    <p style="opacity: 0.5;">Мощь клика: <span id="pwr-val">1</span></p>
</div>

<div class="shop">
    <h2 style="text-align: center; letter-spacing: 5px;">SHOP</h2>
    <div id="shop-list"></div>
</div>

<script>
    let money = 0, pwr = 1, xp = 0, lvl = 1, nextXp = 100;
    let rage = 0, isRage = false;

    // Генерируем 30 апгрейдов с нормальной прогрессией
    const upgrades = [];
    for(let i=1; i<=30; i++) {
        upgrades.push({
            name: "Upgrade Level " + i,
            cost: Math.floor(20 * Math.pow(1.7, i)),
            bonus: Math.floor(3 * Math.pow(1.6, i))
        });
    }

    window.handleTap = function(e) {
        // Логика ярости
        if(!isRage) {
            rage += 2;
            if(rage >= 100) startRage();
        }
        updateRageBar();

        // Расчет урона
        let crit = Math.random() < 0.15;
        let mult = (isRage ? 2 : 1) * (crit ? 6 : 1);
        let val = pwr * mult;

        money += val;
        xp += 5;

        // Эффекты
        spawnText(e.clientX, e.clientY, (crit ? "💥 " : "+") + Math.floor(val), crit);
        
        if(xp >= nextXp) {
            lvl++; xp = 0; nextXp *= 1.6;
            document.getElementById('coin').innerText = lvl > 15 ? "💎" : (lvl > 10 ? "👑" : (lvl > 5 ? "💰" : "🪙"));
            notify("LEVEL " + lvl);
        }
        updateUI();
    };

    function startRage() {
        isRage = true;
        document.getElementById('body').classList.add('rage-active');
        let timer = setInterval(() => {
            rage -= 1;
            updateRageBar();
            if(rage <= 0) {
                isRage = false;
                clearInterval(timer);
                document.getElementById('body').classList.remove('rage-active');
            }
        }, 100);
    }

    function updateRageBar() {
        document.getElementById('rage-fill').style.height = rage + "%";
    }

    function spawnText(x, y, txt, isCrit) {
        const el = document.createElement('div');
        el.className = 'pop';
        el.style.left = (x - 20) + 'px'; el.style.top = (y - 20) + 'px';
        el.style.color = isCrit ? "#ffcc00" : (isRage ? "#ff0050" : "white");
        el.innerText = txt;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 600);
    }

    window.buy = function(i) {
        if(money >= upgrades[i].cost) {
            money -= upgrades[i].cost;
            pwr += upgrades[i].bonus;
            upgrades[i].cost = Math.floor(upgrades[i].cost * 1.5);
            updateUI();
        }
    };

    function updateUI() {
        document.getElementById('money').innerText = "$" + Math.floor(money).toLocaleString();
        document.getElementById('pwr-val').innerText = pwr.toLocaleString();
        document.getElementById('xp-bar').style.width = (xp/nextXp*100) + "%";
        document.getElementById('lvl').innerText = "LVL " + lvl;

        let h = "";
        upgrades.forEach((u, i) => {
            const canBuy = money >= u.cost;
            h += `<div class="item"><b>${u.name}</b><br><span>+${u.bonus.toLocaleString()} click</span>
                  <button onclick="buy(${i})" ${canBuy ? '' : 'disabled'}>$${u.cost.toLocaleString()}</button></div>`;
        });
        document.getElementById('shop-list').innerHTML = h;
    }

    function notify(t) {
        const m = document.getElementById('msg');
        m.innerText = t; m.style.opacity = 1;
        setTimeout(() => m.style.opacity = 0, 1500);
    }

    updateUI();
</script>
</body>
</html>
