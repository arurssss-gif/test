<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Artur Game Hub v4.0</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #fbbf24; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Навигация */
        nav { background: var(--panel); display: flex; justify-content: center; gap: 15px; padding: 15px; border-bottom: 2px solid var(--accent); z-index: 100; }
        nav button { background: #334155; border: 1px solid var(--accent); color: var(--accent); padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        nav button.active { background: var(--accent); color: #000; }

        .tab { display: none; flex: 1; width: 100%; height: 100%; overflow: hidden; }
        .tab.active { display: flex; }

        /* Кликер Лейаут */
        .sidebar { width: 280px; background: rgba(0,0,0,0.3); padding: 20px; overflow-y: auto; border-right: 1px solid #334155; }
        .main-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); position: relative; }
        .shop-view { width: 350px; background: var(--panel); padding: 20px; overflow-y: auto; border-left: 1px solid #334155; }
        
        #coin { font-size: 140px; cursor: pointer; user-select: none; transition: 0.1s; filter: drop-shadow(0 0 30px rgba(251,191,36,0.3)); }
        #coin:active { transform: scale(0.85); }
        
        /* Кнопки магазина */
        .upg-card { background: #2d3748; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #475569; }
        .upg-card b { color: var(--accent); font-size: 18px; display: block; margin-bottom: 5px; }
        .upg-card button { width: 100%; background: #22c55e; border: none; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; margin-top: 8px; }
        .upg-card button:disabled { background: #475569; opacity: 0.5; cursor: not-allowed; }

        /* Игровые зоны */
        .canvas { width: 600px; height: 300px; background: #161b22; border: 3px solid #334155; position: relative; overflow: hidden; border-radius: 15px; }
        #dino { position: absolute; bottom: 0; left: 60px; font-size: 50px; z-index: 10; transform: scaleX(-1); transition: bottom 0.1s; }
        .cactus { position: absolute; bottom: 0; font-size: 35px; z-index: 5; }
        
        #mosq { position: absolute; font-size: 40px; width: 40px; height: 40px; z-index: 10; }
        .cloud { position: absolute; width: 80px; height: 15px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .stat-text { font-size: 24px; margin: 10px 0; font-weight: bold; }
        .lb-row { padding: 10px 0; border-bottom: 1px solid #334155; font-size: 16px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<nav>
    <button onclick="changeTab('c')" id="btn-c" class="active">КЛИКЕР</button>
    <button onclick="changeTab('d')" id="btn-d">ДИНО</button>
    <button onclick="changeTab('m')" id="btn-m">КОМАРИК</button>
</nav>

<div id="tab-c" class="tab active">
    <div class="sidebar">
        <h2 style="color:var(--accent)">Лидеры</h2>
        <div id="leaderboard"></div>
    </div>
    <div class="main-view">
        <div id="coin" onclick="handleTap()">🪙</div>
        <div class="stat-text">Баланс: <span id="balance" style="color:var(--accent)">$0</span></div>
        <p>За клик: +<span id="cpc">1</span></p>
    </div>
    <div class="shop-view">
        <h2 style="color:var(--accent)">Магазин (30)</h2>
        <div id="shop"></div>
    </div>
</div>

<div id="tab-d" class="tab">
    <div class="main-view">
        <h1>Счет: <span id="d-score">0</span></h1>
        <div class="canvas" id="d-area" onclick="dinoJump()">
            <div id="dino">🦖</div>
            <div id="d-obs"></div>
        </div>
        <p>Пробел или Клик для прыжка</p>
    </div>
</div>

<div id="tab-m" class="tab">
    <div class="main-view">
        <h1>Высота: <span id="m-score">0</span></h1>
        <div class="canvas" style="width:400px; height:500px" id="m-area">
            <div id="mosq">🦟</div>
            <div id="m-obs"></div>
        </div>
        <p>Стрелки — влево/вправо. Пробел — лететь.</p>
    </div>
</div>

<script>
    let money = 0, power = 1;
    let upgrades = [];
    for(let i=1; i<=30; i++) {
        upgrades.push({ name: "Мега-Клик " + i, price: Math.floor(15 * Math.pow(1.6, i)), boost: i * 3 });
    }

    // Вкладки
    function changeTab(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        
        stopDino(); stopMosq();
        if(id === 'd') startDino();
        if(id === 'm') startMosq();
    }

    // Кликер
    function handleTap() { money += power; updateUI(); }
    function buyUpg(i) {
        if(money >= upgrades[i].price) {
            money -= upgrades[i].price;
            power += upgrades[i].boost;
            upgrades[i].price = Math.floor(upgrades[i].price * 2.1);
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById('balance').innerText = "$" + Math.floor(money);
        document.getElementById('cpc').innerText = power;
        
        let lb = <div class="lb-row" style="color:var(--accent)"><b>1. Artur (Вы)</b> <span>$${Math.floor(money)}</span></div>;
        for(let i=2; i<=12; i++) lb += <div class="lb-row"><span>${i}. Игрок_${i+5}</span> <span>$${Math.floor(money/(i*0.7))}</span></div>;
        document.getElementById('leaderboard').innerHTML = lb;

        let sh = "";
        upgrades.forEach
