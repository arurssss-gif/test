!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artur's Game Hub</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --accent: #fbbf24;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Navigation Bar */
        nav {
            background: var(--panel);
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            border-bottom: 2px solid var(--accent);
        }

        nav button {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        nav button.active {
            background: var(--accent);
            color: var(--bg);
        }

        .tab-content {
            display: none;
            flex: 1;
            position: relative;
        }

        .tab-content.active {
            display: flex;
        }

        /* --- Clicker Styles --- */
        .clicker-layout {
            flex: 1;
            display: flex;
        }

        .game-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #tapBtn {
            width: 200px; height: 200px; border-radius: 50%;
            background: linear-gradient(145deg, #fbbf24, #d97706);
            border: none; cursor: pointer; font-size: 24px; font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.05s;
        }

        #tapBtn:active { transform: scale(0.92); }

        .sidebar {
            width: 300px; background: var(--panel);
            padding: 20px; border-left: 1px solid #334155;
        }

        .upgrade-card {
            background: #334155; padding: 10px; border-radius: 8px; margin-bottom: 10px;
        }

        /* --- Dino Styles --- */
        #dino-game {
            width: 600px; height: 200px; border-bottom: 2px solid white;
            margin: auto; position: relative; overflow: hidden;
            background: #1e293b;
        }

        #dino {
            width: 40px; height: 40px; background: #fbbf24;
            position: absolute; bottom: 0; left: 50px;
        }

        .cactus {
            width: 20px; height: 40px; background: #ef4444;
            position: absolute; bottom: 0; right: -20px;
        }

        .jump-animation { animation: jump 0.5s linear; }
        @keyframes jump {
            0% { bottom: 0; }
            30% { bottom: 100px; }
            70% { bottom: 100px; }
            100% { bottom: 0; }
        }

        .cactus-move { animation: move 1.5s infinite linear; }
        @keyframes move {
            0% { right: -20px; }
            100% { right: 620px; }
        }
    </style>
</head>
<body>

    <nav>
        <button id="btn1" class="active" onclick="showTab('clicker')">CLICKER GAME</button>
        <button id="btn2" onclick="showTab('dino')">DINO RUNNER</button>
    </nav>

    <div id="clicker" class="tab-content active">
        <div class="clicker-layout">
            <div class="game-zone">
                <h1 style="color:var(--accent)">Balance: $<span id="bal">0</span></h1>
                <button id="tapBtn">TAP</button>
                <p>Click: +<span id="cpc">1</span> | Idle: +<span id="cps">0</span></p>
                <a href="https://www.tiktok.com/@uunbra" style="color:cyan; text-decoration:none; margin-top:20px;">TikTok</a>
            </div>
            <div class="sidebar">
                <h3>Shop</h3>
                <div class="upgrade-card">
                    Bot (+1/s) <br> <button onclick="buy('auto', 1, 10)">Buy for $10</button>
                </div>
                <div class="upgrade-card">
                    Power (+1 Click) <br> <button onclick="buy('click', 1, 50)">Buy for $50</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dino-tab" class="tab-content">
        <div style="text-align:center; width:100%; margin-top:50px;">
            <h2>Dino Runner</h2>
            <p>Press SPACE or Click to Jump!</p>
            <div id="dino-game" onclick="dinoJump()">
                <div id="dino"></div>
                <div id="cactus" class="cactus"></div>
            </div>
            <h3 id="dino-score">Score: 0</h3>
        </div>
    </div>

    <script>
        // Tab switching logic
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            
            if(tabName === 'clicker') {
                document.getElementById('clicker').classList.add('active');
                document.getElementById('btn1').classList.add('active');
            } else {
                document.getElementById('dino-tab').classList.add('active');
                document.getElementById('btn2').classList.add('active');
                startDino();
            }
        }
