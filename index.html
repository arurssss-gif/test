<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN - GOD MODE CLICKER</title>
    <style>
        :root { --accent: #00f2ff; --bg: #05070a; --panel: #0d1117; --rage: #ff0050; --gold: #ffd700; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; user-select: none; }
        
        /* Фон и Брендинг */
        .side-run { position: fixed; left: -10px; top: 50%; transform: translateY(-50%) rotate(-90deg); font-size: 120px; font-weight: 900; color: rgba(255,255,255,0.02); pointer-events: none; }
        .watermark { position: fixed; bottom: 20px; left: 100px; font-size: 20px; font-weight: bold; color: rgba(0,242,255,0.15); letter-spacing: 5px; }

        /* Шкала Rage */
        .rage-container { position: fixed; left: 30px; top: 50%; transform: translateY(-50%); width: 12px; height: 300px; background: #161b22; border: 1px solid #333; border-radius: 10px; overflow: hidden; }
        #rage-fill { position: absolute; bottom: 0; width: 100%; height: 0%; background: var(--rage); box-shadow: 0 0 20px var(--rage); transition: 0.2s; }

        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .shop { width: 400px; background: var(--panel); border-left: 2px solid #1f2937; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; z-index: 10; }

        /* Монета */
        #coin-wrap { position: relative; width: 450px; height: 450px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #coin { font-size: 260px; transition: transform 0.05s; filter: drop-shadow(0 0 50px rgba(0,242,255,0.1)); z-index: 5; }
        #coin:active { transform: scale(0.9); }
        
        .rage-active #coin { filter: drop-shadow(0 0 80px var(--rage)) !important; animation: shake 0.1s infinite; }
        @keyframes shake { 0%{transform:translate(2px)} 50%{transform:translate(-2px)} 100%{transform:translate(2px)} }

        /* Интерфейс */
        .stats-top { position: absolute; top: 20px; text-align: center; }
        h1#money { font-size: 70px; margin: 0; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--accent); }
        .prestige-info { color: var(--gold); font-weight: bold; font-size: 14px; margin-top: 5px; }

        /* Магазин */
        .item { background: #1c2128; border: 1px solid #30363d; padding: 12px; border-radius: 10px; margin-bottom: 10px; position: relative; overflow: hidden; }
        .item b { color: var(--accent); font-size: 16px; }
        .item button { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; background: #238636; color: white; margin-top: 8px; }
        .item button:disabled { background: #21262d; color: #484f58; }

        /* Частицы и тексты */
        .particle { position: absolute; width: 6px; height: 6px; background: var(--accent); pointer-events: none; border-radius: 2px; animation: p-out 0.8s ease-out forwards; }
        @keyframes p-out { 100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(360deg); } }

        .pop { position: absolute; pointer-events: none; animation: popUp 0.7s forwards; font-weight: 900; font-size: 28px; z-index: 100; text-shadow: 2px 2px 0 #000; }
        @keyframes popUp { 0% { opacity:1; transform:translateY(0); } 100% { opacity:0; transform:translateY(-150px); } }

        /* Престиж Кнопка */
        #prestige-btn { display: none; position: absolute; bottom: 30px; background: var(--gold); color: black; padding: 15px 30px; border-radius: 30px; font-weight: 900; cursor: pointer; border: none; box-shadow: 0 0 20px var(--gold); }

        #msg { position: absolute; top: 120px; background: white; color: black; padding: 10px 30px; border-radius: 50px; font-weight: bold; opacity: 0; transition: 0.4s; z-index: 1000; }
    </style>
</head>
<body id="body">

<div id="msg">LEVEL UP!</div>
<div class="side-run">RUN</div>
<div class="watermark">arurs</div>

<div class="rage-container"><div id="rage-fill"></div></div>

<div class="main">
    <div class="stats-top">
        <div id="lvl" style="color:var(--accent); font-weight: bold; letter-spacing: 3px;">LVL 1</div>
        <h1 id="money">$0</h1>
        <div id="prestige-info" class="prestige-info"></div>
    </div>

    <div id="coin-wrap" onmousedown="handleTap(event)">
        <div id="coin">🪙</div>
    </div>
    
    <button id="prestige-btn" onclick="doPrestige()">ПЕРЕРОЖДЕНИЕ (X2 СИЛА)</button>
    <p style="opacity: 0.4;">Сила клика: <span id="pwr-val">1</span> | Рекорд: <span id="best-val">0</span></p>
</div>

<div class="shop">
    <h3 style="text-align: center; color: var(--accent); margin-top: 0;">MARKET</h3>
    <div id="shop-list"></div>
    <button style="margin-top:20px; opacity:0.2; background:none; color:white; border:none; cursor:pointer;" onclick="hardReset()">Сброс данных</button>
</div>

<script>
    let money = 0, pwr = 1, xp = 0, lvl = 1, nextXp = 100;
    let rage = 0, isRage = false, prestigeMult = 1, totalClicks = 0;
    let upgrades = [];

    function initUpgrades() {
        upgrades = [];
        for(let i=1; i<=30; i++) {
            upgrades.push({
                name: "Модуль " + i,
                cost: Math.floor(20 * Math.pow(1.7, i)),
                bonus: Math.floor(4 * Math.pow(1.6, i))
            });
        }
    }

    function save() {
        const data = { money, pwr, xp, lvl, nextXp, upgrades, prestigeMult, totalClicks };
        localStorage.setItem('arturMegaSave', JSON.stringify(data));
    }

    function load() {
        initUpgrades();
        const saved = localStorage.getItem('arturMegaSave');
        if(saved) {
            const d = JSON.parse(saved);
            money = d.money; pwr = d.pwr; xp = d.xp; lvl = d.lvl;
            nextXp = d.nextXp; upgrades = d.upgrades; 
            prestigeMult = d.prestigeMult || 1;
            totalClicks = d.totalClicks || 0;
        }
        updateUI();
    }

    window.handleTap = function(e) {
        if(!isRage) { rage += 2; if(rage >= 100) startRage(); }
        updateRageBar();

        let crit = Math.random() < 0.15;
        let val = pwr * prestigeMult * (isRage ? 2 : 1) * (crit ? 6 : 1);
        
        money += val; xp += 10; totalClicks++;
        
        spawnText(e.clientX, e.clientY, (crit ? "💥 " : "+") + Math.floor(val), crit);
        createParticles(e.clientX, e.clientY);
        
        if(xp >= nextXp) {
            lvl++; xp = 0; nextXp *= 1.6;
            updateSkin();
            notify("LEVEL UP: " + lvl);
        }
        
        if(lvl >= 20) document.getElementById('prestige-btn').style.display = 'block';

        updateUI();
        save();
    };

    function startRage() {
        isRage = true;
        document.getElementById('body').classList.add('rage-active');
        let t = setInterval(() => {
            rage -= 1.5; updateRageBar();
            if(rage <= 0) { isRage = false; clearInterval(t); document.getElementById('body').classList.remove('rage-active'); }
        }, 100);
    }

    function updateRageBar() { document.getElementById('rage-fill').style.height = rage + "%"; }

    function spawnText(x, y, txt, crit) {
        const el = document.createElement('div');
        el.className = 'pop';
        el.style.left = x + 'px'; el.style.top = y + 'px';
        el.style.color = crit ? "var(--gold)" : (isRage ? "var(--rage)" : "white");
        el.innerText = txt;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 700);
    }

    function createParticles(x, y) {
        for(let i=0; i<6; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            p.style.setProperty('--dx', (Math.random()*200-100)+'px');
            p.style.setProperty('--dy', (Math.random()*200-100)+'px');
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }
    }

    window.buy = function(i) {
        if(money >= upgrades[i].cost) {
            money -= upgrades[i].cost;
            pwr += upgrades[i].bonus;
            upgrades[i].cost = Math.floor(upgrades[i].cost * 1.5);
            updateUI();
            save();
        }
    };

    window.doPrestige = function() {
        if(confirm("Перерождение сбросит деньги и апгрейды, но даст ПОСТОЯННЫЙ X2 множитель! Готов?")) {
            prestigeMult *= 2;
            money = 0; pwr = 1; lvl = 1; xp = 0; nextXp = 100;
            initUpgrades();
            document.getElementById('prestige-btn').style.display = 'none';
            save();
            location.reload();
        }
    };

    function updateSkin() {
        const c = document.getElementById('coin');
        c.innerText = lvl > 15 ? "🌌" : (lvl > 10 ? "💎" : (lvl > 5 ? "💰" : "🪙"));
    }

    function updateUI() {
        document.getElementById('money').innerText = "$" + Math.floor(money).toLocaleString();
        document.getElementById('pwr-val').innerText = (pwr * prestigeMult).toLocaleString();
        document.getElementById('lvl').innerText = "LVL " + lvl;
        document.getElementById('best-val').innerText = totalClicks;
        document.getElementById('prestige-info').innerText = prestigeMult > 1 ? МНОЖИТЕЛЬ ПРЕСТИЖА: X${prestigeMult} : "";
        updateSkin();

        let h = "";
        upgrades.forEach((u, i) => {
            const canBuy = money >= u.cost;
            h += `<div class="item"><b>${u.name}</b><br><small>+${u.bonus.toLocaleString()} клик</small>
                  <button onclick="buy(${i})" ${canBuy ? '' : 'disabled'}>$${u.cost.toLocaleString()}</button></div>`;
        });
        document.getElementById('shop-list').innerHTML = h;
    }

    function notify(t) {
        const m = document.getElementById('msg');
        m.innerText = t; m.style.opacity = 1;
        setTimeout(() => m.style.opacity = 0, 1500);
    }

    window.hardReset = function() { if(confirm("УДАЛИТЬ ВСЁ?")) { localStorage.clear(); location.reload(); } };

    load();
</script>
</body>
</html>
