<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artur's Ultimate Game Hub</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #fbbf24; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        nav { background: var(--panel); display: flex; justify-content: center; gap: 10px; padding: 10px; border-bottom: 2px solid var(--accent); }
        nav button { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        nav button.active { background: var(--accent); color: var(--bg); }

        .tab-content { display: none; flex: 1; position: relative; width: 100%; height: 100%; }
        .tab-content.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* --- Clicker --- */
        #tapBtn { width: 180px; height: 180px; border-radius: 50%; background: orange; border: none; font-size: 50px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        #tapBtn:active { transform: scale(0.9); }

        /* --- Dino --- */
        #dinoWindow { width: 600px; height: 200px; border-bottom: 3px solid white; position: relative; overflow: hidden; background: #243447; }
        #dinoObj { position: absolute; bottom: 0; left: 50px; font-size: 40px; width: 40px; height: 40px; }
        #cactusObj { position: absolute; bottom: 0; right: -50px; font-size: 30px; }
        .jump { animation: jumpAnim 0.6s ease-out; }
        @keyframes jumpAnim { 0%, 100% { bottom: 0; } 50% { bottom: 120px; } }
        .cactus-run { animation: moveCactus 1.8s infinite linear; }
        @keyframes moveCactus { 0% { right: -50px; } 100% { right: 650px; } }

        /* --- Cloud Jump --- */
        #jumpWindow { width: 350px; height: 500px; background: #38bdf8; border: 4px solid white; position: relative; overflow: hidden; }
        #mosquito { position: absolute; width: 30px; height: 30px; font-size: 25px; bottom: 50px; left: 160px; }
        .platform { position: absolute; width: 60px; height: 10px; background: white; border-radius: 5px; font-size: 10px; text-align: center; color: #38bdf8; }
    </style>
</head>
<body>

<nav>
    <button id="n1" class="active" onclick="switchTab('click')">CLICKER</button>
    <button id="n2" onclick="switchTab('dino')">DINO</button>
    <button id="n3" onclick="switchTab('jump')">CLOUD JUMP</button>
</nav>

<div id="click" class="tab-content active">
    <h1>Balance: $<span id="bal">0</span></h1>
    <button id="tapBtn" onclick="tap()">🪙</button>
    <p>Click: +<span id="cpc">1</span></p>
    <button onclick="buy(10)">Upgrade Click ($10)</button>
</div>

<div id="dino" class="tab-content">
    <h2>Dino Run 🦖</h2>
    <div id="dinoWindow" onclick="dinoJump()">
        <div id="dinoObj">🦖</div>
        <div id="cactusObj">🌵</div>
    </div>
    <p>Click or Space to jump! Score: <span id="dScore">0</span></p>
</div>

<div id="jump" class="tab-content">
    <h2>Cloud Jump 🦟</h2>
    <div id="jumpWindow">
        <div id="mosquito">🦟</div>
        </div>
    <p>Use Left/Right Arrows! Score: <span id="jScore">0</span></p>
</div>

<script>
    let balance = 0, cpc = 1;
    function tap() { balance += cpc; document.getElementById('bal').innerText = balance; }
    function buy(cost) { if(balance >= cost) { balance -= cost; cpc++; tap(); } }

    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'dino') startDino(); else stopDino();
        if(id === 'jump') startJump();
    }

    // --- Dino Logic ---
    let dInt;
    function dinoJump() { 
        let d = document.getElementById('dinoObj');
        if(!d.classList.contains('jump')) { d.classList.add('jump'); setTimeout(()=>d.classList.remove('jump'), 600); }
    }
    function startDino() {
        const cac = document.getElementById('cactusObj');
        cac.style.display = "block";
        cac.classList.add('cactus-run');
        let score = 0;
        dInt = setInterval(() => {
            let d = document.getElementById('dinoObj'), c = document.getElementById('cactusObj');
            let dT = parseInt(window.getComputedStyle(d).top), cL = parseInt(window.getComputedStyle(c).left);
            if(cL < 90 && cL > 50 && dT >= 150) {
                alert("Game Over!"); cac.classList.remove('cactus-run'); cac.style.display = "none";
            } else { score++; document.getElementById('dScore').innerText = Math.floor(score/10); }
        }, 20);
    }
    function stopDino() { clearInterval(dInt); document.getElementById('cactusObj').classList.remove('cactus-run'); }

    // --- Cloud Jump (Mosquito) ---
    let mPos = {x: 160, y: 50}, mVel = 0, jScore = 0;
    function startJump() {
        const win = document.getElementById('jumpWindow');
        win.innerHTML = '<div id="mosquito">🦟</div>';
        let plats = [];
        for(let i=0; i<6; i++) {
            let p = {x: Math.random()*280, y: i*100};
            plats.push(p);
            let div = document.createElement('div'); div.className = 'platform';
            div.style.left = p.x+'px'; div.style.bottom = p.y+'px'; div.innerText = "☁️";
            win.appendChild(div);
        }
        // Basic physics would go here (gravity/keys) - keeping it light for now
    }
    
    document.addEventListener('keydown', (e) => { if(e.code === 'Space') dinoJump(); });
</script>
</body>
</html>
