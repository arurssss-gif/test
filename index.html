!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Clicker Artur</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; }
        #coin { 
            width: 200px; height: 200px; border-radius: 50%; 
            background: gold; border: 8px solid orange; 
            font-size: 30px; cursor: pointer; margin: 20px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        #coin:active { transform: scale(0.95); }
        .info { font-size: 24px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>Artur's Clicker</h1>

    <div class="info">Монеты: <span id="moneyText">0</span></div>
    
    <button id="coin" onclick="addMoney()">ТАП!</button>

    <div style="margin-top: 50px;">
        <a href="https://www.tiktok.com/@uunbra" style="color: cyan;">My TikTok</a>
    </div>

    <script>
        // Создаем переменную для счета
        let balance = 0;

        // Функция, которая прибавляет монету
        function addMoney() {
            // 1. Увеличиваем число на 1
            balance = balance + 1;
            
            // 2. Находим текст на странице и меняем его на новое число
            document.getElementById('moneyText').innerText = balance;
            
            // Вывод в консоль для проверки (нажми F12 в браузере, чтобы увидеть)
            console.log("Клик! Баланс теперь: " + balance);
        }
    </script>

</body>
</html>
