<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artur's Game Hub</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --accent: #fbbf24;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Navigation */
        nav {
            background: var(--panel);
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 2px solid var(--accent);
            z-index: 100;
        }

        nav button {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        nav button.active {
            background: var(--accent);
            color: var(--bg);
        }

        /* Tab Management */
        .tab-content {
            display: none;
            flex: 1;
            width: 100%;
        }

        .tab-content.active {
            display: flex;
        }

        /* --- Clicker Game Layout --- */
        .clicker-view {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #tapBtn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: linear-gradient(145deg, #fbbf24, #d97706);
            border: none;
            cursor: pointer;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.05s;
        }

        #tapBtn:active { transform: scale(0.92); }

        .sidebar {
            width: 320px;
            background: var(--panel);
            padding: 20px;
            border-left: 1px solid #334155;
        }

        .shop-item {
            background: #334155;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .buy-btn {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .buy-btn:disabled { background: #64748b; opacity: 0.5; }

        /* --- Dino Game Style --- */
        .dino-view {
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #gameArea {
            width: 600px;
            height: 200px;
            border-bottom: 3px solid white;
            background: #1e293b;
            position: relative;
            overflow: hidden;
        }

        #dinoChar {
            width: 40px;
            height: 40px;
            background: #fbbf24;
            position: absolute;
            bottom: 0;
            left: 50px;
        }

        #cactusObj {
            width: 25px;
            height: 45px;
            background: #ef4444;
            position: absolute;
            bottom: 0;
            right: -30px;
        }

        .jump { animation: jumpAnim 0.5s linear; }
        @keyframes jumpAnim {
            0% { bottom: 0; }
            30% { bottom: 100px; }
            70% { bottom: 100px; }
            100% { bottom: 0; }
        }

        .cactus-move { animation: moveAnim 1.5s infinite linear; }
        @keyframes moveAnim {
            0% { right: -30px; }
            100% { right: 630px; }
        }
    </style>
</head>
<body>

    <nav>
        <button id="navClicker" class="active" onclick="switchTab('clicker')">CLICKER</button>
        <button id="navDino" onclick="switchTab('dino')">DINO RUN</button>
    </nav>

    <div id="tabClicker" class="tab-content active">
        <div class="clicker-view">
            <div class="main-area">
                <h1 style="font-size: 3rem; color: var(--accent); margin: 0;">$<span id="balance">0</span></h1>
                <p>Click: +<span id="cpc">1</span> | Idle: +<span id="cps">0</span>/s</p>
                <button id="tapBtn">TAP</button>
                <a href="https://www.tiktok.com/@uunbra" target="_blank" style="color:#38bdf8; margin-top:20px; text-decoration:none;">My TikTok</a>
            </div>
            <div class="sidebar">
                <h2 style="border-bottom:1px solid #444; padding-bottom:10px;">Store</h2>
                <div class="shop-item">
                    <span>Automation (+1/s)</span>
                    <button id="buyAuto" class="buy-btn" onclick="buyItem('auto', 1, 10)">Cost: $10</button>
                </div>
                <div class="shop-item">
                    <span>Power (+1 Click)</span>
                    <button id="buyClick" class="buy-btn" onclick="buyItem('click', 1, 50)">Cost: $50</button>
                </div>
            </div>
        </div>
    </div>

    <div id="tabDino" class="tab-content dino-view">
        <h2>Dino Runner</h2>
        <p>Press SPACE or CLICK to Jump</p>
        <div id="gameArea" onclick="jump()">
            <div id="dinoChar"></div>
            <div id="cactusObj"></div>
        </div>
        <h3 id="scoreText">Score: 0</h3>
    </div>

    <script>
        // --- Tab Management ---
        function switchTab(target) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));

            if(target === 'clicker') {
                document.getElementById('tabClicker').classList.add('active');
                document.getElementById('navClicker').classList.add('active');
                stopDino(); // Останавливаем дино, когда уходим
            } else {
                document.getElementById('tabDino').classList.add('active');
                document.getElementById('navDino').classList.add('active');
                startDino(); // Запускаем дино, когда заходим
            }
        }

        // --- Clicker Logic ---
        let money = 0;
        let power = 1;
        let income = 0;

        const tapBtn = document.getElementById('tapBtn');
        const balEl = document.getElementById('balance');

        tapBtn.onclick = () => {
            money += power;
            refreshUI();
        };

        function buyItem(type, val, price) {
            if (money >= price) {
                money -= price;
                if(type === 'click') power += val;
                if(type === 'auto') income += val;
                refreshUI();
            }
        }

        function refreshUI() {
            balEl.innerText = Math.floor(money);
            document.getElementById('cpc').innerText = power;
            document.getElementById('cps').innerText = income;
            
            // Кнопки магазина
            document.getElementById('buyAuto').disabled = (money < 10);
            document.getElementById('buyClick').disabled = (money < 50);
        }

        setInterval(() => {
            if(income > 0) {
                money += income;
                refreshUI();
            }
        }, 1000);

        // --- Dino Logic ---
        const dino = document.getElementById('dinoChar');
        const cactus = document.getElementById('cactusObj');
        let dinoScore = 0;
        let dinoInterval;

        function jump() {
            if (!dino.classList.contains('jump')) {
                dino.classList.add('jump');
                setTimeout(() => dino.classList.remove('jump'), 500);
            }
        }

        document.addEventListener('keydown', (e) => {
            if(e.code === 'Space' && document.getElementById('tabDino').classList.contains('active')) {
                jump();
            }
        });

        function startDino() {
            cactus.classList.add('cactus-move');
            dinoScore = 0;
            dinoInterval = setInterval(() => {
                let dTop = parseInt(window.getComputedStyle(dino).getPropertyValue("top"));
                let cLeft = parseInt(window.getComputedStyle(cactus).getPropertyValue("left"));

                if(cLeft < 90 && cLeft > 50 && dTop >= 160) {
                    alert("Game Over! Score: " + Math.floor(dinoScore));
                    dinoScore = 0;
                } else {
                    dinoScore += 0.1;
                    document.getElementById('scoreText').innerText = "Score: " + Math.floor(dinoScore);
                }
            }, 20);
        }

        function stopDino() {
            cactus.classList.remove('cactus-move');
            clearInterval(dinoInterval);
        }

        refreshUI(); // Start UI
    </script>
</body>
</html>
