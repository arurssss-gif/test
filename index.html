<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artur's Ventures | Idle Clicker</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent-gold: #fbbf24;
            --text-main: #f8fafc;
            --success-green: #22c55e;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Main Gameplay Area */
        .game-viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .stats-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .balance-display {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--accent-gold);
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
        }

        #mainClicker {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, #fcd34d 0%, #fbbf24 100%);
            border: 12px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            outline: none;
            transition: transform 0.05s ease-in-out, box-shadow 0.2s;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: #92400e;
        }
