<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artur's Game Empire</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #fbbf24; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        nav { background: var(--panel); display: flex; justify-content: center; gap: 10px; padding: 15px; border-bottom: 2px solid var(--accent); z-index: 1000; }
        nav button { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        nav button.active { background: var(--accent); color: var(--bg); }

        .tab { display: none; flex: 1; width: 100%; height: 100%; }
        .tab.active { display: flex; }

        /* --- CLICKER --- */
        .clicker-layout { display: flex; width: 100%; height: 100%; }
        .side { width: 250px; background: rgba(0,0,0,0.2); padding: 15px; overflow-y: auto; font-size: 14px; }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .shop { width: 350px; background: var(--panel); padding: 15px; overflow-y: auto; border-left: 1px solid #334155; }
        #asset { font-size: 100px; cursor: pointer; user-select: none; transition: 0.1s; }
        #asset:active { transform: scale(0.8); }
        .upg-card { background: #2d3748; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #4a5568; }
        .upg-card button { width: 100%; background: #22c55e; border: none; color: white; padding: 8px; border-radius: 5px; cursor: pointer; margin-top: 5px; }
        .upg-card button:disabled { background: #4a5568; opacity: 0.5; }
        .xp-bg { width: 250px; height: 15px; background: #334155; border-radius: 10px; margin: 10px; overflow: hidden; }
        #xpFill { width: 0%; height: 100%; background: var(--accent); }

        /* --- DINO --- */
        #dinoBox { width: 600px; height: 200px; background: #1e293b; border-bottom: 4px solid white; position: relative; overflow: hidden; margin: auto; }
        #dinoObj { position: absolute; bottom: 0; left: 50px; font-size: 45px; transform: scaleX(-1); z-index: 2; }
        .cactus { position: absolute; bottom: 0; right: -50px; font-size: 35px; }

        /* --- JUMP --- */
        #jumpBox { width: 350px; height: 500px; background: #0ea5e9; border: 5px solid white; position: relative; overflow: hidden; margin: auto; }
        #flyer { position: absolute; font-size: 35px; width: 40px; height: 40px; z-index: 5; }
        .plt { position: absolute; width: 70px; height: 15px; background: white; border-radius: 10px; box-shadow: 0 4px #0284c7; }
    </style>
</head>
<body>

<nav>
    <button onclick="st('c')" id="nc" class="active">CLICKER</button>
    <button onclick="st('d')" id="nd">DINO REX</button>
    <button onclick="st('j')" id="nj">MOSQUITO</button>
</nav>

<div id="tc" class="tab active">
    <div class="clicker-layout">
        <div class="side"><h3>Leaderboard</h3><div id="lb"></div></div>
        <div class="main">
            <h2 id="lvT">Level 1</h2>
            <div class="xp-bg"><div id="xpFill"></div></div>
            <div id="asset" onclick="tap()">🪙</div>
            <h1 id="bal">$0</h1>
            <p>CPC: <span id="cpc">1</span> | CPS: <span id="cps">0</span></p>
        </div>
        <div class="shop"><h3>Upgrades</h3><div id="sl"></div></div>
    </div>
</div>

<div id="td" class="tab"><div class="main"><h2>Score: <span id="ds">0</span></h2><div id="dinoBox" onclick="dj()"><div id="dinoObj">🦖</div></div></div></div>

<div id="tj" class="tab"><div class="main"><h2>Height: <span id="js">0</span></h2><div id="jumpBox"><div id="flyer">🦟</div></div></div></div>

<script>
let state = { b: 0, cp: 1, cs: 0, xp: 0, lv: 1 };
let items = [];
for(let i=1; i<=30; i++) items.push({ n: "Tech #"+i, c: Math.floor(15 * Math.pow(1.8, i/1.5)), p: i*2, t: i%2===0?'c':'s' });

function st(t) {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(x => x.classList.remove('active'));
    document.getElementById('t'+t).classList.add('active');
    document.getElementById('n'+t).classList.add('active');
    if(t==='d') initD(); else clearInterval(dI);
    if(t==='j') initJ(); else clearInterval(jI);
}

// CLICKER
function tap() { state.b += state.cp; state.xp += 10; if(state.xp>=100){state.xp=0; state.lv++;} update(); }
function buy(i) { let u = items[i]; if(state.b >= u.c){ state.b -= u.c; if(u.t==='c')state.cp+=u.p; else state.cs+=u.p; u.c = Math.floor(u.c*2); update();}}
function update() {
    document.getElementById('bal').innerText = "$"+Math.floor(state.b);
    document.getElementById('cpc').innerText = state.cp;
    document.getElementById('cps').innerText = state.cs;
    document.getElementById('xpFill').style.width = state.xp+"%";
    document.getElementById('lvT').innerText = "Level "+state.lv;
    let icons = ["🪙","💵","💰","💎","👑","🏦","🏛️"];
    document.getElementById('asset').innerText = icons[Math.min(state.lv-1, 6)];
    let h = ""; items.forEach((u,i) => {
        h += <div class="upg-card"><b>${u.n}</b> (+${u.p} ${u.t==='c'?'Click':'Sec'})<br><button onclick="buy(${i})" ${state.b < u.c ? 'disabled':''}>Buy: $${u.c}</button></div>;
    });
    document.getElementById('sl').innerHTML = h;
    let lb = ""; for(let i=0; i<10; i++) lb += <div>${i+1}. Player_${i+5} - $${(10-i)*100}</div>;
    document.getElementById('lb').innerHTML = lb;
}
setInterval(() => { if(state.cs>0){state.b += state.cs; update();} }, 1000);

// DINO
let dI, dS=0, dSpd=5, isJ=false;
function dj() { if(!isJ){ isJ=true; let d = document.getElementById('dinoObj'); d.style.transition="0.4s"; d.style.bottom="120px"; setTimeout(()=>{d.style.bottom="0px"; setTimeout(()=>isJ=false,400)},400);}}
function initD() {
    dS=0; dSpd=6; document.querySelectorAll('.cactus').forEach(c=>c.remove());
    dI = setInterval(() => {
        if(Math.random() < 0.02) {
            let c = document.createElement('div'); c.className='cactus'; c.innerText = Math.random()>0.5?'🌵':'🌵🌵';
            c.style.right = "-50px"; document.getElementById('dinoBox').appendChild(c);
        }
        document.querySelectorAll('.cactus').forEach(c => {
            let r = parseInt(c.style.right); c.style.right = (r + dSpd) + "px";
            let d = document.getElementById('dinoObj');
            let dBot = parseInt(window.getComputedStyle(d).bottom);
            if(r > 500 && r < 550 && dBot < 40) { alert("Game Over!"); initD(); }
            if(r > 650) c.remove();
        });
        dS++; dSpd += 0.001; document.getElementById('ds').innerText = Math.floor(dS/10);
    }, 20);
}

// JUMP
let jI, jX=150, jY=50, jV=0, plts=[], js=0, isHolding=false;
function initJ() {
    jX=150; jY=50; jV=0; js=0; plts=[];
    const b = document.getElementById('jumpBox'); b.innerHTML='<div id="flyer">🦟</div>';
    for(let i=0; i<8; i++) spawnP(i*70);
    jI = setInterval(() => {
        jV -= 0.3; if(isHolding) jV += 0.6; // Jetpack effect
        jY += jV;
        plts.forEach(p => {
            if(jV < 0 && jX > p.x-30 && jX < p.x+60 && jY > p.y && jY < p.y+15) { jV = 8; js++; }
            if(jY > 200) { p.y -= jV; p.e.style.bottom = p.y+'px'; }
            if(p.y < -20) { p.y = 550; p.x = Math.random()*280; p.e.style.left = p.x+'px'; }
        });
        if(jY < -50) initJ();
        let f = document.getElementById('flyer'); f.style.left=jX+'px'; f.style.bottom=Math.min(jY,200)+'px';
        document.getElementById('js').innerText = js;
    }, 20);
}
function spawnP(y) {
    let x = Math.random()*280; let e = document.createElement('div'); e.className='plt';
    e.style.left=x+'px'; e.style.bottom=y+'px'; document.getElementById('jumpBox').appendChild(e);
    plts.push({x, y, e});
}

window.onkeydown = (e) => { 
    if(e.key==="ArrowLeft") jX-=15; if(e.key==="ArrowRight") jX+=15; 
    if(e.key==="ArrowUp" || e.key===" ") { isHolding=true; dj(); }
};
window.onkeyup = (e) => { if(e.key==="ArrowUp" || e.key===" ") isHolding=false; };
window.onmousedown = () => isHolding = true;
window.onmouseup = () => isHolding = false;

update();
</script>
</body>
</html>
