<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN - GOD CLICKER</title>
    <style>
        :root { --accent: #00f2ff; --bg: #05070a; --panel: #0d1117; --rage: #ff0050; --gold: #ffd700; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; user-select: none; }
        
        .side-run { position: fixed; left: -10px; top: 50%; transform: translateY(-50%) rotate(-90deg); font-size: 100px; font-weight: 900; color: rgba(255,255,255,0.02); pointer-events: none; }
        
        /* Шкала Rage */
        .rage-container { position: fixed; left: 20px; top: 50%; transform: translateY(-50%); width: 10px; height: 250px; background: #161b22; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #rage-fill { position: absolute; bottom: 0; width: 100%; height: 0%; background: var(--rage); transition: height 0.2s; box-shadow: 0 0 15px var(--rage); }

        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* Магазин */
        .shop { width: 380px; background: var(--panel); border-left: 2px solid #1f2937; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        #shop-list { flex: 1; overflow-y: auto; padding-right: 5px; }

        /* Монета */
        #coin-wrap { width: 300px; height: 300px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; z-index: 10; }
        .digital-coin { 
            width: 200px; height: 200px; background: radial-gradient(circle, #ffe566 0%, #cc9900 100%); 
            border: 6px solid #ffcc00; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 80px; font-weight: 900; color: #664d00; transition: transform 0.05s;
            box-shadow: 0 0 30px rgba(0,242,255,0.2);
        }
        #coin-wrap:active .digital-coin { transform: scale(0.9); }
        
        .rage-active .digital-coin { animation: shake 0.1s infinite; border-color: var(--rage); box-shadow: 0 0 50px var(--rage); }
        @keyframes shake { 0%{transform: translate(1px, 1px)} 50%{transform: translate(-1px, -1px)} 100%{transform: translate(1px, -1px)} }

        h1#money { font-size: 60px; margin: 10px 0; text-shadow: 0 0 20px var(--accent); }
        .item { background: #1c2128; border: 1px solid #30363d; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
        .item button { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; background: #238636; color: white; }
        .item button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

        .pop { position: absolute; pointer-events: none; animation: popUp 0.6s forwards; font-weight: 900; font-size: 24px; z-index: 100; }
        @keyframes popUp { 0% { opacity:1; transform:translateY(0); } 100% { opacity:0; transform:translateY(-100px); } }
    </style>
</head>
<body>

<div class="side-run">RUN</div>
<div class="rage-container"><div id="rage-fill"></div></div>

<div class="main">
    <div id="lvl" style="color:var(--accent); font-weight: bold;">LVL 1</div>
    <h1 id="money">$0</h1>
    <div id="coin-wrap">
        <div id="coin" class="digital-coin">$</div>
    </div>
    <p style="opacity: 0.5;">Мощность: <span id="pwr-val">1</span></p>
</div>

<div class="shop">
    <h3 style="text-align: center; color: var(--accent);">МАГАЗИН</h3>
    <div id="shop-list"></div>
    <button onclick="localStorage.clear(); location.reload();" style="margin-top:10px; opacity:0.3; background:none; color:white; border:none; cursor:pointer;">Сброс</button>
</div>

<script>
    // Все переменные в одном месте
    let state = {
        money: 0, pwr: 1, xp: 0, lvl: 1, nextXp: 100,
        rage: 0, isRage: false, upgrades: []
    };

    // Принудительная инициализация
    function init() {
        state.upgrades = [];
        for(let i=1; i<=30; i++) {
            state.upgrades.push({
                name: "Улучшение #" + i,
                cost: Math.floor(20 * Math.pow(1.7, i)),
                bonus: Math.floor(4 * Math.pow(1.6, i))
            });
        }

        const saved = localStorage.getItem('runClickerSave');
        if(saved) {
            const d = JSON.parse(saved);
            Object.assign(state, d);
        }
        
        // Вешаем клик программно, чтобы точно работало
        document.getElementById('coin-wrap').addEventListener('mousedown', handleTap);
        updateUI();
    }

    function handleTap(e) {
        if(!state.isRage) {
            state.rage += 2;
            if(state.rage >= 100) startRage();
        }

        let crit = Math.random() < 0.15;
        let val = state.pwr * (state.isRage ? 2 : 1) * (crit ? 6 : 1);
        
        state.money += val;
        state.xp += 10;
        
        if(state.xp >= state.nextXp) {
            state.lvl++; state.xp = 0; state.nextXp *= 1.6;
        }

        spawnText(e.clientX, e.clientY, (crit ? "💥 " : "+") + Math.floor(val), crit);
        updateUI();
        save();
    }

    function startRage() {
        state.isRage = true;
        document.getElementById('body')?.classList.add('rage-active'); // На всякий случай
        document.body.classList.add('rage-active');
        let t = setInterval(() => {
            state.rage -= 1.5;
            document.getElementById('rage-fill').style.height = state.rage + "%";
            if(state.rage <= 0) {
                state.isRage = false;
                clearInterval(t);
                document.body.classList.remove('rage-active');
            }
        }, 100);
    }

    function spawnText(x, y, txt, crit) {
        const el = document.createElement('div');
        el.className = 'pop';
        el.style.left = x + 'px'; el.style.top = y + 'px';
        el.style.color = crit ? "var(--gold)" : "white";
        el.innerText = txt;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 600);
    }

    window.buy = function(i) {
        let u = state.upgrades[i];
        if(state.money >= u.cost) {
            state.money -= u.cost;
            state.pwr += u.bonus;
            u.cost = Math.floor(u.cost * 1.5);
            updateUI();
            save();
        }
    };

    function updateUI() {
        document.getElementById('money').innerText = "$" + Math.floor(state.money).toLocaleString();
        document.getElementById('pwr-val').innerText = state.pwr.toLocaleString();
        document.getElementById('lvl').innerText = "LVL " + state.lvl;
        document.getElementById('rage-fill').style.height = state.rage + "%";

        let h = "";
        state.upgrades.forEach((u, i) => {
            const canBuy = state.money >= u.cost;
            h += `<div class="item"><b>${u.name}</b><br>
                  <button onclick="buy(${i})" ${canBuy ? '' : 'disabled'}>$${u.cost.toLocaleString()}</button></div>`;
        });
        document.getElementById('shop-list').innerHTML = h;
    }

    function save() { localStorage.setItem('runClickerSave', JSON.stringify(state)); }

    // Старт
    init();
</script>
</body>
</html>
